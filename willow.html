<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shaka Player Fullscreen</title>

  <!-- Shaka Player -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.css" />

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #player-container {
      position: relative;
      width: 100%;
      max-width: 960px;
      margin: auto;
      aspect-ratio: 16 / 9;
      background: black;
    }

    video {
      width: 100%;
      height: 100%;
    }

    #status-message {
      color: #0f0;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div id="player-container">
    <video id="video" class="shaka-video" playsinline></video>
  </div>

  <div id="status-message">Loading stream…</div>

  <script>
    async function initPlayer() {
      const video = document.getElementById('video');
      const container = document.getElementById('player-container');
      const status = document.getElementById('status-message');

      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        status.textContent = "❌ Browser not supported";
        return;
      }

      // Create player
      const player = new shaka.Player(video);

      // Create UI (THIS enables fullscreen properly)
      const ui = new shaka.ui.Overlay(player, container, video);
      const controls = ui.getControls();

      // UI configuration (includes fullscreen button)
      ui.configure({
        controlPanelElements: [
          'play_pause',
          'time_and_duration',
          'spacer',
          'mute',
          'volume',
          'fullscreen'
        ],
        addSeekBar: true
      });

      // Player config
      player.configure({
        streaming: {
          bufferingGoal: 10,
          rebufferingGoal: 2,
          lowLatencyMode: true
        },
        manifest: {
          dash: {
            ignoreMinBufferTime: true
          }
        },
        drm: {
          clearKeys: {
            '1e23e51b09a67b83813c17049870bcd4':
            'c3d6288e378b0dc55320fd0e6fd2e55f'
          }
        }
      });

      const streamUrl =
        "https://neacdnpop3-edge02.aws.playco.com/live/eds/CricLife1/DASH/CricLife1.mpd";

      try {
        await player.load(streamUrl);
        status.textContent = "✅ Stream loaded";

        // Autoplay handling
        try {
          video.muted = false;
          await video.play();
        } catch {
          video.muted = true;
          await video.play();
        }
      } catch (err) {
        console.error(err);
        status.textContent = "⚠️ Stream failed to load";
      }

      // Error handling
      player.addEventListener('error', e => {
        console.error('Shaka error', e.detail);
        status.textContent = "⚠️ Playback error";
      });
    }

    document.addEventListener('DOMContentLoaded', initPlayer);
  </script>

  <!-- Optional: disable devtools -->
  <script disable-devtool-auto src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>

</body>
</html>
