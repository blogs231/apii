<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Netflix Style IPTV</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css"/>

<style>

html,body{
margin:0;
height:100%;
background:#000;
font-family:Arial;
overflow:hidden;
}

/* PLAYER */
#player-container{
position:fixed;
inset:0;
z-index:1;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* DARK GRADIENT */
.overlay{
position:absolute;
bottom:0;
width:100%;
height:40%;
background:linear-gradient(transparent, black);
z-index:2;
pointer-events:none;
}

/* CHANNEL ROW */
#content{
position:absolute;
bottom:40px;
left:40px;
right:40px;
z-index:5;
color:white;
}

.row-title{
font-size:22px;
margin-bottom:10px;
}

/* CARD STRIP */
.card-row{
display:flex;
gap:14px;
overflow-x:auto;
scroll-behavior:smooth;
}

.card{
min-width:180px;
height:100px;
background:#111;
border-radius:10px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition:.25s;
border:2px solid transparent;
}

.card img{
max-width:80%;
max-height:80%;
}

.card:hover{
transform:scale(1.15);
border:2px solid white;
}

/* LOADER */
#loader{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border:6px solid #222;
border-top:6px solid white;
border-radius:50%;
width:65px;
height:65px;
animation:spin 1s linear infinite;
z-index:10;
}

@keyframes spin{
to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* STATUS */
#status{
position:absolute;
top:20px;
left:20px;
color:white;
z-index:10;
font-size:14px;
opacity:.8;
}

/* LOGO */
#logo{
position:absolute;
top:20px;
right:25px;
z-index:10;
}

#logo img{
width:110px;
opacity:.9;
}

</style>
</head>

<body>

<div id="player-container">
<div id="loader"></div>
<div id="status">Starting player...</div>

<div id="logo">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg">
</div>

<video id="video" autoplay playsinline></video>

<div class="overlay"></div>

<!-- CHANNEL UI -->
<div id="content">
<div class="row-title">Live Channels</div>
<div class="card-row" id="channels"></div>
</div>

</div>

<script>

const channelList=[

{
name:"Sports Live",
logo:"https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg",
url:"https://a201aivottlinear-a.akamaihd.net/OTTB/lhr-nitro/live/dash/enc/feh5lmnfkl/out/v1/2f30a0bcdbc64a09b2e101d0b71ed290/cenc.mpd",
keys:{
'dc9ab6bff6028c1685847a104e2d5a21':'de34baecf3f167ad1c847836397d38ca'
}
},

// ADD MORE CHANNELS HERE

];

let player;
let video=document.getElementById("video");
let current=0;

/* FULLSCREEN */
function fullscreen(){
const el=document.documentElement;
if(el.requestFullscreen) el.requestFullscreen();
}

/* INIT PLAYER */
async function init(){

shaka.polyfill.installAll();

player=new shaka.Player(video);

new shaka.ui.Overlay(player,
document.getElementById('player-container'),
video);

player.configure({
streaming:{
bufferingGoal:30,
rebufferingGoal:1,
bufferBehind:60,
lowLatencyMode:true
}
});

buildUI();
loadChannel(0);

/* reconnect */
player.addEventListener('error',()=>{
document.getElementById("status").innerText="Reconnecting...";
setTimeout(()=>loadChannel(current),2000);
});

}

/* BUILD NETFLIX UI */
function buildUI(){

const container=document.getElementById("channels");

channelList.forEach((ch,i)=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`<img src="${ch.logo}">`;

card.onclick=()=>loadChannel(i);

container.appendChild(card);

});

}

/* LOAD CHANNEL */
async function loadChannel(index){

current=index;

const ch=channelList[index];

document.getElementById("loader").style.display="block";
document.getElementById("status").innerText="Loading "+ch.name;

try{

player.configure({
drm:{clearKeys:ch.keys}
});

await player.load(ch.url);

video.play();

document.getElementById("loader").style.display="none";
document.getElementById("status").innerText="LIVE • "+ch.name;

fullscreen();

}catch{

document.getElementById("status").innerText="Retrying...";
setTimeout(()=>loadChannel(index),3000);

}

}

/* KEYBOARD CONTROL */
document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowRight"){
current=(current+1)%channelList.length;
loadChannel(current);
}

if(e.key==="ArrowLeft"){
current=(current-1+channelList.length)%channelList.length;
loadChannel(current);
}

if(e.key==="f") fullscreen();

});

/* disable right click */
document.addEventListener("contextmenu",e=>e.preventDefault());

/* fullscreen fallback */
document.addEventListener("click",fullscreen,{once:true});

init();

</script>

</body>
</html>
