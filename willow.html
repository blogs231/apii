<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultra Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css"/>

<style>

html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:black;
  overflow:hidden;
  font-family:Arial;
}

/* PLAYER */
#player-container{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  background:black;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
  background:black;
}

/* Loader */
#loader{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  border:6px solid #222;
  border-top:6px solid #fff;
  border-radius:50%;
  width:60px;
  height:60px;
  animation:spin 1s linear infinite;
  z-index:9999;
}

@keyframes spin{
  to{ transform:translate(-50%, -50%) rotate(360deg); }
}

/* Watermark */
#watermark{
  position:absolute;
  top:15px;
  right:20px;
  z-index:999;
  opacity:.85;
}

#watermark img{
  width:120px;
}

/* Status */
#status{
  position:absolute;
  bottom:20px;
  left:20px;
  color:white;
  font-size:14px;
  opacity:.7;
}

</style>
</head>

<body>

<div id="player-container">
    <div id="loader"></div>

    <!-- CHANGE LOGO HERE -->
    <div id="watermark">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg">
    </div>

    <video id="video" autoplay playsinline></video>

    <div id="status">Initializing player...</div>
</div>


<script>

const streamUrl =
"https://a201aivottlinear-a.akamaihd.net/OTTB/lhr-nitro/live/dash/enc/feh5lmnfkl/out/v1/2f30a0bcdbc64a09b2e101d0b71ed290/cenc.mpd";


function fullscreen(){
    const elem=document.getElementById("player-container");

    if(elem.requestFullscreen) elem.requestFullscreen();
    else if(elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
}

/* Cursor hide */
let cursorTimer;
document.addEventListener("mousemove",()=>{
    document.body.style.cursor="default";

    clearTimeout(cursorTimer);
    cursorTimer=setTimeout(()=>{
        document.body.style.cursor="none";
    },2000);
});

/* Disable right click */
document.addEventListener("contextmenu",e=>e.preventDefault());


async function initPlayer(){

    const video=document.getElementById("video");
    const loader=document.getElementById("loader");
    const status=document.getElementById("status");

    shaka.polyfill.installAll();

    if(!shaka.Player.isBrowserSupported()){
        status.textContent="Browser not supported";
        return;
    }

    const player=new shaka.Player(video);
    new shaka.ui.Overlay(player, document.getElementById('player-container'), video);

    player.configure({

        streaming:{
            bufferingGoal:25,
            rebufferingGoal:1,
            bufferBehind:40,
            lowLatencyMode:true,
            stallEnabled:true,

            retryParameters:{
                maxAttempts:6,
                baseDelay:1000,
                backoffFactor:2,
                fuzzFactor:.5
            }
        },

        abr:{
            enabled:true,
            switchInterval:3
        },

        manifest:{
            dash:{
                ignoreMinBufferTime:true
            }
        },

        drm:{
            clearKeys:{
              'dc9ab6bff6028c1685847a104e2d5a21':'de34baecf3f167ad1c847836397d38ca'
            }
        }

    });

    async function loadStream(){

        try{
            loader.style.display="block";
            status.textContent="Loading stream...";

            await player.load(streamUrl);

            loader.style.display="none";
            status.textContent="LIVE";

            video.muted=false;

            try{
                await video.play();
            }catch{
                video.muted=true;
                await video.play();
            }

            fullscreen();

        }catch(err){

            status.textContent="Reconnecting...";
            console.log("Reconnect attempt...");

            setTimeout(loadStream,3000);
        }
    }

    loadStream();

    /* Auto reconnect if stream drops */
    player.addEventListener('error',()=>{
        status.textContent="Stream interrupted... reconnecting";
        loadStream();
    });

}

/* Gesture fullscreen */
document.addEventListener("click", fullscreen, {once:true});
document.addEventListener("touchstart", fullscreen, {once:true});

/* Double click fullscreen */
document.addEventListener("dblclick", fullscreen);


document.addEventListener('DOMContentLoaded', initPlayer);

</script>

</body>
</html>
