<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shaka Player Fullscreen</title>

<!-- Shaka Player -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.css"/>

<style>
  body {
    margin: 0;
    background: black;
  }

  #player-container {
    position: relative;
    width: 100%;
    max-width: 960px;
    margin: auto;
    aspect-ratio: 16 / 9;
    background: black;
  }

  video {
    width: 100%;
    height: 100%;
  }

  #status-message {
    color: #0f0;
    text-align: center;
    margin-top: 8px;
    font-size: 14px;
  }
</style>
</head>

<body>

<div id="player-container">
  <video id="video" class="shaka-video" playsinline></video>
</div>
<div id="status-message">Loading…</div>

<script>
async function initPlayer() {
  const video = document.getElementById('video');
  const container = document.getElementById('player-container');
  const status = document.getElementById('status-message');

  shaka.polyfill.installAll();

  if (!shaka.Player.isBrowserSupported()) {
    status.textContent = "Browser not supported!";
    return;
  }

  const player = new shaka.Player(video);

  // ✅ UI Overlay (REQUIRED for fullscreen)
  const ui = new shaka.ui.Overlay(player, container, video);
  ui.configure({
    controlPanelElements: [
      'play_pause',
      'time_and_duration',
      'spacer',
      'mute',
      'volume',
      'fullscreen'
    ],
    addSeekBar: true
  });

  // Player config
  player.configure({
    streaming: {
      bufferingGoal: 10,
      rebufferingGoal: 2,
      startAtSegmentBoundary: true,
      lowLatencyMode: true
    },
    manifest: {
      dash: {
        ignoreMinBufferTime: true
      }
    },
    drm: {
      clearKeys: {
        '4e8b5ddac5332a4e66c002b4c0f22322':
        'd06de29b0eacb81ac6e3f325849047e8'
      }
    }
  });

  const streamUrl =
    "https://cors-proxy.cooks.fyi/https://ev-fast-mpd.starzplayarabia.com/live/eds/Criclife_3/DASH/Criclife_3.mpd";

  try {
    await player.load(streamUrl);
    status.textContent = "✅ Stream loaded";

    try {
      video.muted = false;
      await video.play();
    } catch {
      video.muted = true;
      await video.play();
    }
  } catch (err) {
    console.error(err);
    status.textContent = "⚠️ Failed to load stream";
  }

  player.addEventListener('error', e => {
    console.error(e.detail);
    status.textContent = "⚠️ Playback error";
  });
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>

<script disable-devtool-auto src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>

</body>
</html>
